<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مريض جديد</title>
    <link rel="stylesheet" href="css/add_patient.css">
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <button type="button" id="backToMainBtn" class="btn-back">🔙 رجوع</button>
            <h1>➕ إضافة مريض جديد</h1>
            <div style="width: 80px;"></div>
        </div>

        <!-- نموذج بيانات المريض - حقل الاسم هو نفسه البحث -->
        <form id="patientForm">
            <div class="input-group" style="position: relative;">
                <label for="fullName">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="اكتب اسم المريض..." autocomplete="off" required>
                <div id="suggestions" class="suggestions-box"></div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="age">العمر</label>
                    <input type="number" id="age" required>
                </div>
                <div class="input-group">
                    <label for="phone">رقم الهاتف</label>
                    <input type="tel" id="phone" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="permanentId">الرقم الدائم</label>
                    <input type="text" id="permanentId" readonly class="readonly-field">
                </div>
                <div class="input-group">
                    <label for="dailyId">الرقم اليومي</label>
                    <input type="text" id="dailyId" readonly class="readonly-field">
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-next">➡️ متابعة إلى الفحوصات</button>
                <button type="button" id="clearFormBtn" class="btn-clear-bottom">🗑️ تفريغ الحقول</button>
            </div>
        </form>
    </div>

    <script src="scripts/add_patient.js"></script>
</body>
</html>
