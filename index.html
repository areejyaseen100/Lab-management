<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل الجمعية الطبية - تسجيل دخول</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-circle">🔬</div>
        <h1>معمل الجمعية الطبية</h1>
        
        <div class="input-group">
            <label for="usernameSelect">اختر اسم المستخدم</label>
            <select id="usernameSelect" class="form-select">
                <option value="">-- اختر المستخدم --</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور" disabled>
        </div>
        
        <button onclick="handleLogin()" id="loginBtn" disabled>تسجيل الدخول</button>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="test-data">
            <p>📋 بيانات تجريبية:</p>
            <p class="admin-data">مدير: admin / 123456</p>
            <p class="tech-data">فني: tech1 / 123456</p>
            <p class="tech-data">فني: tech2 / 123456</p>
            <p class="tech-data">استقبال: reception / 123456</p>
        </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
