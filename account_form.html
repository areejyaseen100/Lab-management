<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج الحساب - معمل الجمعية الطبية</title>
    <link rel="stylesheet" href="css/account_form.css">
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <button type="button" id="backBtn" class="btn-back">🔙 رجوع</button>
            <h1 id="formTitle">➕ إضافة حساب جديد</h1>
            <div style="width: 80px;"></div>
        </div>

        <form id="accountForm">
            <input type="hidden" id="accountId" value="">

            <div class="form-group">
                <label for="fullName">الاسم الكامل <span class="required">*</span></label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-group">
                <label for="username">اسم المستخدم <span class="required">*</span></label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور <span class="required">*</span></label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label for="role">الصلاحية <span class="required">*</span></label>
                <select id="role" required>
                    <option value="">-- اختر الصلاحية --</option>
                    <option value="مدير">مدير</option>
                    <option value="فني">فني</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">💾 حفظ</button>
                <button type="button" class="btn-cancel" id="cancelBtn">إلغاء</button>
            </div>
        </form>
    </div>

    <script src="scripts/account_form.js"></script>
</body>
</html>
