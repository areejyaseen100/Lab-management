<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الحسابات - معمل الجمعية الطبية</title>
    <link rel="stylesheet" href="css/accounts.css">
</head>
<body>
    <div class="full-page">
        <div class="accounts-container">
            <div class="header-bar">
                <button type="button" id="backBtn" class="btn-back">🔙 رجوع</button>
                <h1>👥 إدارة الحسابات</h1>
                <div style="width: 80px;"></div>
            </div>

            <!-- قائمة الحسابات - تأخذ مساحتها الطبيعية -->
            <div class="accounts-list" id="accountsList">
                <!-- هنا تظهر الحسابات -->
            </div>

            <!-- زر إضافة حساب جديد - في وسط الشاشة -->
            <div class="add-button-container">
                <button id="addAccountBtn" class="btn-add">➕ إضافة حساب جديد</button>
            </div>
        </div>
    </div>

    <script src="scripts/accounts.js"></script>
</body>
</html>
