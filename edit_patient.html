<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل بيانات المريض - معمل الجمعية الطبية</title>
    <link rel="stylesheet" href="css/edit_patient.css">
</head>
<body>
    <div class="container">
        <!-- شريط العنوان مع زر الرجوع -->
        <div class="header-bar">
            <button type="button" id="backBtn" class="btn-back">🔙 رجوع</button>
            <h1>✏️ تعديل بيانات المريض</h1>
            <div style="width: 80px;"></div>
        </div>

        <!-- نموذج تعديل بيانات المريض -->
        <form id="editPatientForm">
            <!-- الرقم الدائم (غير قابل للتعديل) -->
            <div class="form-group">
                <label for="permanentId">الرقم الدائم</label>
                <input type="text" id="permanentId" readonly class="readonly-field">
            </div>

            <!-- الاسم الكامل -->
            <div class="form-group">
                <label for="fullName">الاسم الكامل <span class="required">*</span></label>
                <input type="text" id="fullName" required>
            </div>

            <!-- العمر ورقم الهاتف في صف واحد -->
            <div class="form-row">
                <div class="form-group">
                    <label for="age">العمر <span class="required">*</span></label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label for="phone">رقم الهاتف <span class="required">*</span></label>
                    <input type="tel" id="phone" required>
                </div>
            </div>

            <!-- أزرار التحكم -->
            <div class="button-group">
                <button type="submit" class="btn-save">💾 حفظ التغييرات</button>
                <button type="button" class="btn-cancel" id="cancelBtn">إلغاء</button>
            </div>
        </form>
    </div>

    <script src="scripts/edit_patient.js"></script>
</body>
</html>
